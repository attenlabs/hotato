<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 794 488" width="794" height="488" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" role="img" aria-label="One battery, one default configuration, two opposite failures: a missed real interruption and a false stop on a backchannel"><rect x="0" y="0" width="794" height="488" fill="#1b1714" /><text x="24" y="26" fill="#f1e8d7" font-size="17" font-weight="700">Same battery, same default config, one run: fails BOTH directions</text>
<g transform="translate(0,40.0)">
  <rect x="0" y="0" width="794" height="154"
        rx="10" fill="#241f1a" stroke="#3a3128" stroke-width="1" />
  <text x="24" y="22" fill="#f1e8d7" font-size="15" font-weight="600"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Missed a real interruption</text>
  <text x="770" y="22" fill="#f0663a" font-size="14"
        font-weight="700" text-anchor="end"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace">[FAIL]</text>
  <text x="24" y="46" fill="#b7ab97" font-size="11.5"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace">vapi-default-10-quiet-interrupt -- talk_over=0.25s, no yield in the search window</text>
  <g transform="translate(24,48)"><svg class="tl-svg" viewBox="0 0 746 120" width="746" height="120" role="img" aria-label="Scored timeline: the caller track starts at 2.00 seconds and the agent track keeps going with no yield marker" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"><line x1="92.0" y1="22" x2="92.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="92.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">0s</text><line x1="170.0" y1="22" x2="170.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="170.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">1s</text><line x1="248.0" y1="22" x2="248.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="248.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">2s</text><line x1="326.0" y1="22" x2="326.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="326.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">3s</text><line x1="404.0" y1="22" x2="404.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="404.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">4s</text><line x1="482.0" y1="22" x2="482.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="482.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">5s</text><line x1="560.0" y1="22" x2="560.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="560.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">6s</text><line x1="638.0" y1="22" x2="638.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="638.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">7s</text><line x1="716.0" y1="22" x2="716.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="716.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">8s</text><rect x="248.0" y="18" width="19.5" height="64" fill="#f0663a" fill-opacity="0.16" /><text x="80" y="38" fill="#f1e8d7" font-size="12" text-anchor="end">Caller</text><text x="80" y="70" fill="#f1e8d7" font-size="12" text-anchor="end">Agent</text><line x1="92" y1="34" x2="716" y2="34" stroke="#3a3128" stroke-width="1" /><line x1="92" y1="66" x2="716" y2="66" stroke="#3a3128" stroke-width="1" /><rect x="248.0" y="22" width="19.5" height="24" rx="4" fill="#ead9a6" /><rect x="507.0" y="22" width="20.3" height="24" rx="4" fill="#ead9a6" /><rect x="92.0" y="54" width="120.9" height="24" rx="4" fill="#7fb2c4" /><rect x="241.8" y="54" width="184.1" height="24" rx="4" fill="#7fb2c4" /><rect x="437.5" y="54" width="156.0" height="24" rx="4" fill="#7fb2c4" /><rect x="606.8" y="54" width="80.3" height="24" rx="4" fill="#7fb2c4" /><rect x="712.9" y="54" width="3.1" height="24" rx="4" fill="#7fb2c4" /><line x1="248.0" y1="18" x2="248.0" y2="82" stroke="#f0663a" stroke-width="1.6" stroke-dasharray="3 3" /><text x="244.0" y="12" fill="#f0663a" font-size="10" text-anchor="end">onset</text></svg></g>
</g>
<g transform="translate(0,212.0)">
  <rect x="0" y="0" width="794" height="154"
        rx="10" fill="#241f1a" stroke="#3a3128" stroke-width="1" />
  <text x="24" y="22" fill="#f1e8d7" font-size="15" font-weight="600"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace">False-stopped on a backchannel</text>
  <text x="770" y="22" fill="#f0663a" font-size="14"
        font-weight="700" text-anchor="end"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace">[FAIL]</text>
  <text x="24" y="46" fill="#b7ab97" font-size="11.5"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace">vapi-default-04-backchannel-halt -- soft ack, not a bid for the floor; yielded in 0.34s anyway</text>
  <g transform="translate(24,48)"><svg class="tl-svg" viewBox="0 0 746 120" width="746" height="120" role="img" aria-label="Scored timeline: the caller track starts at 2.00 seconds and the agent track stops at a yield marker 0.34 seconds after onset" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"><line x1="92.0" y1="22" x2="92.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="92.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">0s</text><line x1="170.0" y1="22" x2="170.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="170.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">1s</text><line x1="248.0" y1="22" x2="248.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="248.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">2s</text><line x1="326.0" y1="22" x2="326.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="326.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">3s</text><line x1="404.0" y1="22" x2="404.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="404.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">4s</text><line x1="482.0" y1="22" x2="482.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="482.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">5s</text><line x1="560.0" y1="22" x2="560.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="560.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">6s</text><line x1="638.0" y1="22" x2="638.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="638.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">7s</text><line x1="716.0" y1="22" x2="716.0" y2="96" stroke="#463b30" stroke-width="1" /><text x="716.0" y="111" fill="#b7ab97" font-size="10" text-anchor="middle">8s</text><rect x="248.0" y="18" width="25.0" height="64" fill="#f0663a" fill-opacity="0.16" /><text x="80" y="38" fill="#f1e8d7" font-size="12" text-anchor="end">Caller</text><text x="80" y="70" fill="#f1e8d7" font-size="12" text-anchor="end">Agent</text><line x1="92" y1="34" x2="716" y2="34" stroke="#3a3128" stroke-width="1" /><line x1="92" y1="66" x2="716" y2="66" stroke="#3a3128" stroke-width="1" /><rect x="248.0" y="22" width="25.0" height="24" rx="4" fill="#ead9a6" /><rect x="92.0" y="54" width="99.8" height="24" rx="4" fill="#7fb2c4" /><rect x="227.7" y="54" width="46.8" height="24" rx="4" fill="#7fb2c4" /><line x1="248.0" y1="18" x2="248.0" y2="82" stroke="#f0663a" stroke-width="1.6" stroke-dasharray="3 3" /><text x="244.0" y="12" fill="#f0663a" font-size="10" text-anchor="end">onset</text><line x1="274.5" y1="18" x2="274.5" y2="82" stroke="#74c98a" stroke-width="1.8" /><text x="278.5" y="12" fill="#74c98a" font-size="10" text-anchor="start">yield</text></svg></g>
</g><text x="24" y="386" fill="#b7ab97" font-size="13">Turning sensitivity UP catches the miss above but worsens the</text><text x="24" y="408" fill="#b7ab97" font-size="13">backchannel below; turning it DOWN reverses that. No single</text><text x="24" y="430" fill="#b7ab97" font-size="13">threshold wins both rows: hotato diagnose returns</text><text x="24" y="452" fill="#b7ab97" font-size="13">do_not_tune_single_threshold. Provider default settings, one</text><text x="24" y="474" fill="#b7ab97" font-size="13">assistant, one recording date -- corpus/vapi-defaults/.</text></svg>