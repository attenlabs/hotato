# PyPI Trusted Publishing (OIDC) -- additive, disarmed by default.
#
# This workflow does NOT replace or touch the existing release path
# (docs/RELEASE-CHECKLIST.md's manual "Publish to PyPI" step, done by hand
# with an API token). It exists so that path is available once an operator
# opts in, and until then it is inert:
#
#   - it only runs on workflow_dispatch (never on push/tag), AND
#   - it requires a `confirm` input equal to the literal string "PUBLISH", AND
#   - it requires a `version` input that must match pyproject.toml exactly
#     (the job fails before building anything if it doesn't), AND
#   - the publish step needs PyPI's "Trusted Publisher" configured for THIS
#     exact repo + workflow filename + environment name before GitHub's
#     short-lived OIDC token will be accepted by PyPI at all. Until an
#     operator does that in the PyPI UI, a dispatch of this workflow builds,
#     tests, and twine-checks the package, then fails cleanly at the publish
#     step with an OIDC trust error. Nothing is uploaded, no secret exists to
#     leak (no PyPI API token is stored or used anywhere in this workflow).
#
# Operator setup steps (PyPI UI) live in docs/RELEASE-CHECKLIST.md.
#
# No long-lived PyPI credential is used or needed: `id-token: write` lets
# this workflow mint a short-lived OIDC token that PyPI exchanges for a
# scoped, single-use upload token at publish time (PEP 740 / PyPA Trusted
# Publishing). That permission is granted ONLY on the publish job below,
# never at the workflow level, and the job that grants it is gated behind
# both the confirm/version checks above AND a `pypi` GitHub Environment
# (Settings > Environments), which an operator can additionally protect with
# required reviewers for a human-approval gate on top of the input checks.

name: publish-pypi-oidc

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match pyproject.toml exactly, e.g. 0.7.2)"
        required: true
        type: string
      confirm:
        description: 'Type PUBLISH (exact, case-sensitive) to confirm. Any other value aborts before anything is built.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Confirmation input must be exactly PUBLISH
        run: |
          if [ "${{ inputs.confirm }}" != "PUBLISH" ]; then
            echo "::error::confirm input was '${{ inputs.confirm }}', not the required literal 'PUBLISH'. Aborting before any build step." >&2
            exit 1
          fi

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: version input must match pyproject.toml
        id: check-version
        run: |
          python - <<'PY'
          import os
          import re

          pyproject = open("pyproject.toml").read()
          m = re.search(r'(?m)^version\s*=\s*"([^"]+)"', pyproject)
          if not m:
              raise SystemExit("could not find version in pyproject.toml")
          pv = m.group(1)

          requested = os.environ["REQUESTED_VERSION"]
          if requested != pv:
              raise SystemExit(
                  f"version input {requested!r} != pyproject.toml version {pv!r}; "
                  "refusing to build/publish a mismatched version."
              )

          print(f"version input matches pyproject.toml: {pv}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={pv}\n")
          PY
        env:
          REQUESTED_VERSION: ${{ inputs.version }}

      - name: Install package and dev/test dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Full test suite
        run: python -m pytest -q

      # The release sanity job and trusted publisher share this exact pinned
      # toolchain. The action also exports its commit-derived
      # SOURCE_DATE_EPOCH for the independent second build below.
      - name: Build canonical sdist and wheel
        uses: ./.github/actions/build-python-dist
        with:
          output-directory: dist

      # Reproducible-build check: rebuild the wheel + sdist a SECOND time into a
      # clean directory with the same SOURCE_DATE_EPOCH and pinned backend, then
      # compare. FAIL on any real drift. dist-verify/ is scratch, never
      # uploaded or published.
      #   - Wheel: byte-for-byte reproducible with a pinned backend +
      #     SOURCE_DATE_EPOCH; compared by raw sha256.
      #   - Sdist: setuptools does NOT normalize the gzip mtime or the tar member
      #     mtimes (directory entries + regenerated PKG-INFO carry wall-clock
      #     mtimes), so the .tar.gz bytes are not stable run-to-run. We compare
      #     the sdist's CONTENT instead (member names + file bytes, timestamps
      #     ignored): a changed/injected file still fails, timestamp noise does
      #     not. Raw sha256sums of both builds are printed for the audit trail.
      - name: Reproducible-build check (second build, compare sha256)
        run: |
          rm -rf dist-verify && mkdir dist-verify
          SOURCE_DATE_EPOCH="$SOURCE_DATE_EPOCH" python -m build --no-isolation --outdir dist-verify
          echo "== first build ==";  ( cd dist && sha256sum *.whl *.tar.gz )
          echo "== second build =="; ( cd dist-verify && sha256sum *.whl *.tar.gz )
          python - <<'PY'
          import glob, hashlib, os, sys, tarfile

          def one(pattern, root):
              hits = glob.glob(os.path.join(root, pattern))
              assert len(hits) == 1, f"expected exactly one {pattern} in {root}/, got {hits}"
              return hits[0]

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as fh:
                  for chunk in iter(lambda: fh.read(1 << 16), b""):
                      h.update(chunk)
              return h.hexdigest()

          def sdist_content_digest(path):
              # Order-stable digest of (member name, mode, is-file, sha256(bytes)),
              # ignoring mtime/uid/gid and the gzip wrapper.
              entries = []
              with tarfile.open(path, "r:gz") as tf:
                  for m in sorted(tf.getmembers(), key=lambda x: x.name):
                      body = tf.extractfile(m).read() if m.isfile() else b""
                      entries.append(
                          (m.name, m.mode, m.isfile(), hashlib.sha256(body).hexdigest())
                      )
              return hashlib.sha256(repr(entries).encode()).hexdigest()

          w1, w2 = one("*.whl", "dist"), one("*.whl", "dist-verify")
          s1, s2 = one("*.tar.gz", "dist"), one("*.tar.gz", "dist-verify")

          problems = []
          if sha256_file(w1) != sha256_file(w2):
              problems.append("wheel is not byte-reproducible across two builds")
          d1, d2 = sdist_content_digest(s1), sdist_content_digest(s2)
          print(f"sdist content-digest: build1={d1} build2={d2}")
          if d1 != d2:
              problems.append("sdist file contents differ across two builds (not just timestamps)")

          if problems:
              for p in problems:
                  print(f"::error::non-reproducible build: {p}")
              sys.exit(1)
          print("reproducible: wheel byte-identical, sdist contents identical across two builds")
          PY

      # CycloneDX SBOM(s) written to a SEPARATE sbom/ dir so dist/ stays pure
      # sdist+wheel for the PyPI publish job (gh-action-pypi-publish uploads
      # every file in packages-dir). One whole-surface SBOM + one per profile.
      - name: Generate and validate SBOMs (whole surface + per profile)
        run: |
          mkdir -p sbom
          python scripts/gen_sbom.py --out sbom/hotato.sbom.cdx.json
          python scripts/gen_sbom.py --check sbom/hotato.sbom.cdx.json
          for profile in $(python scripts/gen_sbom.py --list-profiles); do
            python scripts/gen_sbom.py --profile "$profile" --out "sbom/hotato.sbom.$profile.cdx.json"
            python scripts/gen_sbom.py --check "sbom/hotato.sbom.$profile.cdx.json"
          done
          ls -1 sbom/*.cdx.json

      # The exact artifacts that were hashed above; the publish job downloads
      # THESE bytes and attests + publishes them (never a rebuild).
      - uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: pypi-dist
          path: dist/
          if-no-files-found: error

      - uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: hotato-sbom
          path: sbom/*.cdx.json
          if-no-files-found: error

  publish:
    needs: build-and-verify
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write # PyPI Trusted Publishing OIDC + attestation signing; granted ONLY on this job
      attestations: write # write a GitHub build-provenance attestation for the published artifacts; ONLY on this job
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: pypi-dist
          path: dist/

      # Build-provenance attestation over the EXACT downloaded sdist + wheel
      # (the same bytes that build-and-verify hashed and that get published
      # below). Verifiable afterwards with `gh attestation verify <file>
      # --repo attenlabs/hotato` (see docs/RELEASE-CHECKLIST.md). Runs only on
      # this gated publish job, which is the only place attestations:write and
      # id-token:write are granted.
      - name: Attest build provenance for the published artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          packages-dir: dist/
