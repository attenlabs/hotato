# Full test suite. Suite audio renders deterministically at session start (~19s).
name: tests
on:
  push:
    branches: [main]
  pull_request:
# One live run per ref: a superseded push cancels the previous in-flight run
# instead of piling a queue of stale full matrices.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        # Docs (VALIDATION.md, COMPARE.md, CONTRACTS.md, SUITES.md, BENCHMARK.md)
        # have long claimed "3.10, 3.11, and 3.12" for the determinism guarantee;
        # 3.11 was missing here (only present in hotato.yml's lighter single-score
        # PR gate, which does not run the determinism-asserting test suite).
        # Added 2026-07-10 so the claim matches what actually runs.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q

  # Lint gate (RATCHET). Runs Ruff against the config baked into pyproject.toml
  # ([tool.ruff]): `ruff check` is the enforced gate. It is a deliberately GREEN
  # baseline -- never a red job -- tightened over time by shrinking
  # `lint.ignore` in pyproject, not by loosening it. `ruff format` style is
  # declared in the same config for local use and a future one-time
  # normalization pass; whole-tree `ruff format --check` is intentionally NOT
  # gated here yet because the tree predates ruff-format and enforcing it now
  # would require reformatting nearly every file. Kept a separate job,
  # ubuntu-latest, one python, mirroring the sdist-guard structure.
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install ruff==0.13.0
      - run: ruff --version
      - run: ruff check src tests

  # MCP-server contract exercised WITH the optional MCP SDK installed. The
  # default `pytest` job installs only ".[dev]", so the MCP tool-registration
  # and initialize/version checks in test_mcp_parity.py SKIP there (they guard
  # on `import mcp`). This job installs the `mcp` extra so those checks actually
  # RUN: the server imports, its twelve tools register against the in-module
  # inventory tuple, the scoring tool's envelope matches the CLI core, and the
  # fleet tools' shapes hold. Deterministic and fast (stdio/local, no network,
  # no models). Separate job, ubuntu-latest, one python.
  mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -e ".[dev,mcp]"
      - run: >-
          python -m pytest -q
          tests/test_mcp_parity.py
          tests/test_mcp_fleet_tools.py
          tests/test_mcp_new_tools.py
          tests/test_mcp_doc_inventory.py
          tests/test_mcp_report_path.py

  # Cross-platform coverage, added 2026-07-10. The determinism claim in the
  # docs was previously scoped to "Linux x86_64" only because that is all this
  # matrix ran; this job extends the FULL suite to macOS and Windows so that
  # scope can be widened once it is green, or narrowed with a named reason if
  # it is not. One python version per OS (not a full cross product) -- this is
  # about OS coverage, not another python-version sweep.
  portability:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu/3.12 is covered by the pytest job's 3.12 leg (identical steps
        # on the same runner image), so this matrix carries only the OTHER
        # operating systems.
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # Windows is MEASURED, not supported: the suite has known Windows failures
    # (cross-drive relpath, path-separator assumptions, POSIX-only calls).
    # The job runs so the failures stay visible and countable; it does not gate
    # a release, and no Windows support is claimed anywhere in the docs.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q

  # Determinism, measured per OS then compared ACROSS OS. Job 1 in
  # docs/VALIDATION.md already asserts byte-identical re-runs; this job runs
  # that exact property (two runs of the bundled synthetic self-test, hashed)
  # on each OS, then a separate compare job reports whether the digest also
  # matches ACROSS OS. Same-OS mismatch is a real regression (hard fail).
  # Cross-OS mismatch is NOT hard-failed here: it would be a genuine, currently
  # unmeasured finding (e.g. libm transcendental-function rounding in the
  # synthetic-audio renderer), and the instruction governing this job is to
  # measure and report it, not to assert a guarantee we have not proven yet.
  determinism:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu/3.12 is covered by the pytest job's 3.12 leg (identical steps
        # on the same runner image), so this matrix carries only the OTHER
        # operating systems.
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: pip install .

      # shell: python sidesteps bash-vs-powershell quoting differences across
      # the three OSes entirely -- the script text is identical everywhere.
      - name: Score the bundled self-test twice and hash each run
        shell: python
        run: |
          import hashlib
          import subprocess
          import sys

          def run_once():
              out = subprocess.run(
                  [sys.executable, "-m", "hotato", "run", "--suite", "barge-in",
                   "--format", "json", "--no-fail"],
                  capture_output=True, check=True, text=True,
              ).stdout
              return hashlib.sha256(out.encode("utf-8")).hexdigest()

          d1 = run_once()
          d2 = run_once()
          assert d1 == d2, (
              f"determinism regression on this OS/Python: two runs of the same "
              f"self-test produced different output ({d1} != {d2})"
          )
          with open("digest.txt", "w", encoding="utf-8") as f:
              f.write(d1 + "\n")
          print(f"{sys.platform} digest: {d1}")

      - uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: determinism-digest-${{ matrix.os }}
          path: digest.txt

  # Reports (never silently hides) whether the per-OS digests from the
  # `determinism` job above agree with each other. Always exits 0: a cross-OS
  # mismatch is a finding to write up (see
  # ~/Projects/hotato-launch/PORTABILITY-MATRIX-2026-07-10.md), not a reason to
  # redden every PR on a claim this job is the first thing to actually test.
  determinism-compare:
    needs: determinism
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: determinism-digest-*
          path: digests

      - name: Compare digests across OS and write a summary
        shell: python
        run: |
          import glob
          import os

          digests = {}
          for path in sorted(glob.glob("digests/determinism-digest-*/digest.txt")):
              os_name = path.split("determinism-digest-")[1].split(os.sep)[0]
              digests[os_name] = open(path, encoding="utf-8").read().strip()

          lines = ["# Cross-OS determinism", "", "| OS | digest |", "|---|---|"]
          lines += [f"| {k} | `{v}` |" for k, v in sorted(digests.items())]
          unique = set(digests.values())
          if len(unique) <= 1:
              lines += ["", f"MATCH: all {len(digests)} OS(es) produced the same digest."]
          else:
              lines += ["", f"DIFFER: {len(unique)} distinct digests across "
                             f"{len(digests)} OS(es). This is a genuine finding, "
                             f"not a flaked check -- see PORTABILITY-MATRIX.md."]
              print("::warning::cross-OS determinism digests differ; see job summary")

          summary = "\n".join(lines) + "\n"
          print(summary)
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write(summary)

  # Guard against a green wheel masking a broken sdist (shipped in 0.2.3 and
  # 0.3.0: MANIFEST.in omitted small non-audio test dependencies, so an
  # extracted sdist hit collection errors even though the editable install
  # above was fine). This job builds the sdist, extracts it to a CLEAN
  # directory (no leftover repo files to paper over a MANIFEST gap), installs
  # ONLY that extracted tree into a fresh venv, and runs the full suite from
  # inside it. Kept as its own job, separate from `pytest` above, on purpose.
  sdist-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Build the sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Extract the sdist to a clean directory
        run: |
          mkdir -p "$RUNNER_TEMP/sdist-extract"
          tar -xzf dist/*.tar.gz -C "$RUNNER_TEMP/sdist-extract"
          sdist_dir=$(find "$RUNNER_TEMP/sdist-extract" -mindepth 1 -maxdepth 1 -type d)
          echo "SDIST_DIR=$sdist_dir" >> "$GITHUB_ENV"

      - name: Install the extracted sdist plus test deps into a fresh venv
        run: |
          python -m venv "$RUNNER_TEMP/sdist-venv"
          "$RUNNER_TEMP/sdist-venv/bin/pip" install "$SDIST_DIR[dev]"

      # Run FROM the extracted tree, not the checkout: this is what proves the
      # sdist is self-consistent. Fails the build (nonzero exit) on any
      # collection error; skips remain allowed for genuinely-absent heavy real
      # audio fixtures.
      - name: Run the full suite from the extracted sdist tree
        working-directory: ${{ env.SDIST_DIR }}
        run: $RUNNER_TEMP/sdist-venv/bin/python -m pytest -q

  # The root Action (action.yml) exercised on this repository itself through
  # the `uses: ./` Action-path mechanism, against the consumer conformance
  # fixture (tests/fixtures/action-consumer/). This proves the composite
  # wiring, summary, outputs, and exit propagation on a real runner; the
  # local harness (tests/test_action_consumer.py) covers the same pieces
  # offline. The remaining gate, running the Action from an UNRELATED
  # repository against a pinned revision, needs that external repository and
  # a published revision, and is tracked on the release checklist.
  action-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: All-pass fixture suite through the root Action
        id: qa-pass
        uses: ./
        with:
          suite: tests/fixtures/action-consumer/suite/pass.suite.json
          agent: action-smoke-agent
          output: .hotato/pass

      # qa-pass ran the default 'action' mode, which is zero-egress (PYTHONPATH,
      # no install), so hotato is not yet importable process-wide. The
      # preinstalled scenario below needs an explicit install of the checkout.
      - name: Install hotato for the preinstalled scenario
        run: python -m pip install --no-deps .

      - name: Mixed-fail fixture suite through the root Action
        id: qa-mixed
        continue-on-error: true
        uses: ./
        with:
          suite: tests/fixtures/action-consumer/suite/consumer.suite.json
          agent: action-smoke-agent
          output: .hotato/mixed
          hotato-version: preinstalled

      - name: Assert outputs and exit propagation
        if: always()
        env:
          PASS_STATUS: ${{ steps.qa-pass.outputs.status }}
          PASS_EXIT: ${{ steps.qa-pass.outputs.exit-code }}
          PASS_RESULT: ${{ steps.qa-pass.outputs.suite-result }}
          PASS_SUMMARY: ${{ steps.qa-pass.outputs.summary }}
          MIXED_STATUS: ${{ steps.qa-mixed.outputs.status }}
          MIXED_EXIT: ${{ steps.qa-mixed.outputs.exit-code }}
          MIXED_OUTCOME: ${{ steps.qa-mixed.outcome }}
        run: |
          test "$PASS_STATUS" = pass
          test "$PASS_EXIT" = 0
          test -f "$PASS_RESULT"
          test -f "$PASS_SUMMARY"
          test "$MIXED_STATUS" = fail
          test "$MIXED_EXIT" = 1
          test "$MIXED_OUTCOME" = failure

      # Artifact upload stays an explicit consumer step, exactly as the
      # documented consumer workflow does it.
      - if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: hotato-action-smoke
          path: .hotato
          if-no-files-found: error
