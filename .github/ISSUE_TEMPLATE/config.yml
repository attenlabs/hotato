blank_issues_enabled: true
contact_links:
  - name: Contributing a recorded call to the corpus
    url: https://github.com/attenlabs/hotato/blob/main/docs/CORPUS-GOVERNANCE.md
    about: >-
      Adding a recorded call to the corpus? Read the governance doc first:
      consent, PII, PHI, and how validity is reported (ms error and a confusion
      matrix, never an accuracy %). Then see corpus/README.md and run
      corpus/validate.py before you open a PR.
  - name: Security, or a consent / PII concern
    url: https://github.com/attenlabs/hotato/security/policy
    about: >-
      Found a recording that shouldn't have been published, or a data-handling
      problem? Report it privately rather than in a public issue. Removal
      requests are honored.
  - name: hotato docs and website
    url: https://hotato.dev
    about: Project overview, docs, and how to reach the maintainers.
