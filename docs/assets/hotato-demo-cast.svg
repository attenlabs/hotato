<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" width="680" height="340" font-family="ui-monospace, 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" role="img" aria-label="Terminal recording of uvx hotato start --demo catching a 2.66 second talk-over and returning exit 1">
  <title>uvx hotato start --demo catches a 2.66s talk-over</title>
  <desc>A terminal types uvx hotato start --demo, then reveals that a transcript which passed every text eval failed on timing: the agent talked over the caller for 2.66 seconds, so the gate returns exit 1.</desc>
  <style>
    .win { fill: #14110d; }
    .bar { fill: #201b14; }
    .txt { font-size: 15px; }
    .prompt { fill: #6f8f4a; }
    .cmd { fill: #f2ede4; }
    .dim { fill: #8a8172; }
    .fail { fill: #e0603a; }
    .metric { fill: #f2ede4; }
    .num { fill: #e0603a; font-weight: 700; }
    .pass { fill: #6f8f4a; }
    .exit { fill: #e0603a; font-weight: 700; }

    /* command types in, char-reveal via clip-path */
    .type {
      clip-path: inset(0 100% 0 0);
      animation: type 1.1s steps(24) 0.5s forwards;
    }
    @keyframes type { to { clip-path: inset(0 0 0 0); } }

    .caret { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .line { opacity: 0; animation: reveal 0.01s linear forwards; }
    @keyframes reveal { to { opacity: 1; } }
    .l1 { animation-delay: 2.0s; }
    .l2 { animation-delay: 2.4s; }
    .l3 { animation-delay: 2.9s; }
    .l4 { animation-delay: 3.4s; }
    .l5 { animation-delay: 4.1s; }
    .l6 { animation-delay: 4.6s; }
    .l7 { animation-delay: 5.3s; }
  </style>

  <rect class="win" x="0" y="0" width="680" height="340" rx="10"/>
  <rect class="bar" x="0" y="0" width="680" height="30" rx="10"/>
  <rect class="bar" x="0" y="16" width="680" height="14"/>
  <circle cx="20" cy="15" r="5" fill="#e0603a"/>
  <circle cx="38" cy="15" r="5" fill="#c9a227"/>
  <circle cx="56" cy="15" r="5" fill="#6f8f4a"/>
  <text class="txt dim" x="340" y="20" text-anchor="middle" font-size="12">hotato</text>

  <!-- prompt + typed command -->
  <text class="txt" x="22" y="66">
    <tspan class="prompt">$ </tspan><tspan class="cmd type">uvx hotato start --demo</tspan><tspan class="cmd caret">&#9608;</tspan>
  </text>

  <!-- output -->
  <text class="txt" x="22" y="104">
    <tspan class="line l1 fail">Conversation failed: Agent did not yield;</tspan>
  </text>
  <text class="txt" x="22" y="126">
    <tspan class="line l2 fail">measured talk-over was 2.66 s.</tspan>
  </text>

  <text class="txt" x="40" y="160">
    <tspan class="line l3 metric">talk-over  </tspan><tspan class="line l3 num">2.66s</tspan><tspan class="line l3 dim">   the agent kept talking while</tspan>
  </text>
  <text class="txt" x="40" y="182">
    <tspan class="line l3 dim">                 the caller held the floor</tspan>
  </text>

  <text class="txt" x="22" y="222">
    <tspan class="line l4 dim">That transcript passed every text eval.</tspan>
  </text>
  <text class="txt" x="22" y="244">
    <tspan class="line l5 dim">The timing did not. hotato pins it as a CI</tspan>
  </text>
  <text class="txt" x="22" y="266">
    <tspan class="line l6 dim">contract that reproduces byte for byte.</tspan>
  </text>

  <text class="txt" x="22" y="304">
    <tspan class="line l7 prompt">$ </tspan><tspan class="line l7 dim">echo $?  &#8594; </tspan><tspan class="line l7 exit">1</tspan><tspan class="line l7 dim">   the gate is red until it is fixed</tspan>
  </text>
</svg>
