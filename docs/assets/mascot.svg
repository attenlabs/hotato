<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="hotato mascot">
  <title>hotato mascot: a deadpan steam potato</title>
  <!-- steam: three ember ticks, single accent hue, staggered so it never reads as horns -->
  <g fill="none" stroke="#ff5a1f" stroke-linecap="round" stroke-width="1.6">
    <path d="M17.5 7.2 q-1.8 -1.3 0 -2.5 q1.8 -1.2 0 -2.4"/>
    <path d="M21 6.8 q1.9 -1.4 0 -2.7 q-1.9 -1.3 0 -2.6"/>
    <path d="M24.5 7.4 q-1.7 -1.2 0 -2.3 q1.7 -1.1 0 -2.1"/>
  </g>
  <!-- potato: one warm on-token fill, no outline stroke -->
  <path d="M8 24c-1.5-8 4-14 13-14.5 10-.5 12 6 12 12 0 7-5.5 12-13.5 12C12 33.5 9 30 8 24Z" fill="#f5b942"/>
  <!-- deadpan face: two flat eyes and a flat mouth, cut in the dark bg tone -->
  <g stroke="#16110d" stroke-width="2.2" stroke-linecap="round">
    <line x1="14.5" y1="21.5" x2="18.3" y2="21.5"/>
    <line x1="21.7" y1="21.5" x2="25.5" y2="21.5"/>
    <line x1="17.5" y1="27.4" x2="23.5" y2="27.4"/>
  </g>
</svg>
